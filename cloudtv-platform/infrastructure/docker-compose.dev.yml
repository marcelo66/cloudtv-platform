version: '3.9'

networks:
  cloudtv-dev:
    driver: bridge

volumes:
  postgres-dev-data:
  redis-dev-data:
  minio-dev-data:
  hls-output:
  video-processing:

services:

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cloudtv-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudtv}
      POSTGRES_USER: ${POSTGRES_USER:-cloudtv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudtv_dev_password_change_in_prod}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cloudtv-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudtv_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudtv-redis-dev
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis-dev-data:/data
    ports:
      - "6379:6379"
    networks:
      - cloudtv-dev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── MinIO (S3/R2 local para dev) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cloudtv-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-dev-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI → http://localhost:9001
    networks:
      - cloudtv-dev
    restart: unless-stopped

  # ─── MinIO bucket init ────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: cloudtv-minio-init
    depends_on:
      - minio
    networks:
      - cloudtv-dev
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/cloudtv-storage;
      mc anonymous set download local/cloudtv-storage;
      echo 'MinIO bucket ready.';
      "
    restart: on-failure

  # ─── MediaMTX (RTMP + HLS) ───────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: cloudtv-mediamtx-dev
    ports:
      - "1935:1935"   # RTMP — OBS apunta aquí
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS output → http://localhost:8888/{slug}/index.m3u8
      - "9997:9997"   # API REST de control
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - cloudtv-dev
    restart: unless-stopped

  # ─── Redis Commander (UI dev) ────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cloudtv-redis-ui
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_dev_password}"
    ports:
      - "8081:8081"
    networks:
      - cloudtv-dev
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - tools
