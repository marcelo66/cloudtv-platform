# CloudTV — Nginx reverse proxy

# Frontend
upstream frontend {
    server frontend:3000;
}

# API
upstream api {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de upload (videos grandes)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/cloudtv_access.log;
    error_log  /var/log/nginx/cloudtv_error.log;

    # ── API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts más largos para uploads y procesamiento
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
    }

    # ── HLS output (MediaMTX) ────────────────────────────────
    location /hls/ {
        proxy_pass         http://mediamtx:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # Headers para streaming
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Frontend (todo lo demás) ─────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
